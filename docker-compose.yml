services:
  postgres:
    build:
      context: .
      target: postgres_image
    container_name: postgres
    env_file:
      - .env.user
    ports:
      -  "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data


  data_generator:
    build:
        context: .
        target: data_generator
    container_name: data-generator
    env_file:
      - .env.user
    depends_on:
      postgres:
          condition: service_healthy

volumes:
  postgres_data:
