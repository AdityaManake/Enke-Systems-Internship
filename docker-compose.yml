services:
  db-prod:
    build: .
    container_name: db-prod
    ports:
      - "5436:5432"
    env_file:
      - .env.prod
    volumes:
      - prod_data:/var/lib/postgresql/data

  db-dev:
    build: .
    container_name: db-dev
    ports:
      - "5437:5432"
    env_file:
      - .env.dev
    volumes:
      - dev_data:/var/lib/postgresql/data

volumes:
  prod_data:
  dev_data: